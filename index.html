<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>ZAANCITER.STR | OB52 </title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', system-ui, -apple-system, 'Segoe UI', sans-serif;
    }
    body {
      background: radial-gradient(circle at 10% 20%, #0a0a1a, #03010f);
      color: #f0eefc;
      padding: 1.5rem;
      min-height: 100vh;
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #1e1a3a; border-radius: 10px; }
    ::-webkit-scrollbar-thumb { background: #b77cff; border-radius: 10px; }
    .container { max-width: 1300px; margin: 0 auto; }
    .glow-header { text-align: center; margin-bottom: 2rem; }
    .badge-neon {
      background: rgba(128, 0, 255, 0.2);
      backdrop-filter: blur(12px);
      display: inline-block;
      padding: 0.3rem 1.2rem;
      border-radius: 60px;
      font-size: 0.75rem;
      border: 1px solid #aa66ff;
      color: #d9b4ff;
      margin-bottom: 1rem;
    }
    h1 {
      font-size: 3rem;
      background: linear-gradient(135deg, #e6aaff, #aa66ff, #7a2eff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 12px #9b4dff40;
      letter-spacing: -1px;
    }
    .brand-str {
      font-size: 1.2rem;
      color: #c084fc;
      letter-spacing: 2px;
      margin-top: -5px;
    }
    .sub { color: #bc9aff; margin-top: 8px; }
    .hero-img {
      text-align: center;
      margin: 20px auto 30px;
      max-width: 400px;
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 20px 35px -10px rgba(106, 13, 255, 0.5), 0 0 0 2px #aa66ff66;
    }
    .hero-img img { width: 100%; height: 100%; object-fit: cover; cursor: pointer; display: block; }
    .category-card {
      background: rgba(20, 15, 45, 0.6);
      backdrop-filter: blur(4px);
      border-radius: 40px;
      padding: 1.5rem;
      margin-bottom: 2rem;
      border: 1px solid #6a2eff66;
    }
    .category-title {
      font-size: 1.8rem;
      font-weight: 600;
      border-left: 6px solid #c084fc;
      padding-left: 18px;
      margin-bottom: 1.4rem;
    }
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 1.2rem;
    }
    .product-card {
      background: linear-gradient(145deg, #15102e, #0c0922);
      border-radius: 28px;
      padding: 1rem 0.8rem 0.8rem;
      transition: all 0.25s ease;
      cursor: pointer;
      border: 1px solid #3a2a6e;
      text-align: center;
    }
    .product-card:hover {
      transform: translateY(-6px);
      border-color: #c084fc;
      box-shadow: 0 14px 28px -8px #9b4dff80;
      background: #1a1138;
    }
    .product-name { font-weight: 600; font-size: 0.9rem; margin: 8px 0; }
    .product-price { font-size: 1.2rem; font-weight: bold; color: #e9b3ff; text-shadow: 0 0 4px #c45eff; }
    .badge-platform { background: #2a1f55; display: inline-block; padding: 2px 12px; border-radius: 30px; font-size: 0.7rem; }
    .modal-modern {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(8px);
      justify-content: center;
      align-items: center;
      z-index: 2000;
    }
    .modal-container {
      background: #100b26e6;
      border-radius: 44px;
      max-width: 500px;
      width: 90%;
      padding: 1.8rem;
      border: 1px solid #b77eff;
      box-shadow: 0 0 35px #9f4eff66;
      animation: fadeSlideUp 0.25s ease;
      max-height: 90vh;
      overflow-y: auto;
    }
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(25px);}
      to { opacity: 1; transform: translateY(0);}
    }
    .close-modal { float: right; font-size: 28px; cursor: pointer; }
    .form-group { margin-bottom: 1rem; }
    .form-group input {
      width: 100%;
      padding: 12px 16px;
      background: #1f1a3a;
      border: 1px solid #5f3bcc;
      border-radius: 36px;
      color: white;
      outline: none;
    }
    .file-upload {
      background: #2a235a;
      border-radius: 36px;
      padding: 10px;
      text-align: center;
      cursor: pointer;
      border: 1px dashed #b77eff;
      margin-top: 8px;
    }
    .file-input-custom {
      width: 100%;
      padding: 10px;
      background: #1f1a3a;
      border-radius: 36px;
      color: white;
      margin-top: 8px;
      cursor: pointer;
    }
    .preview-container {
      width: 100%;
      aspect-ratio: 1 / 1;
      max-width: 200px;
      margin: 10px auto 0;
      border-radius: 16px;
      overflow: hidden;
      background: #0a0820;
      display: none;
    }
    .preview-img { width: 100%; height: 100%; object-fit: cover; }
    .payment-flex { display: flex; gap: 20px; margin: 10px 0; flex-wrap: wrap; }
    .pay-method { display: flex; align-items: center; gap: 8px; background: #221d44; padding: 6px 16px; border-radius: 40px; cursor: pointer; }
    .nomor-rekening { background: #00000033; padding: 8px; border-radius: 28px; font-size: 0.85rem; text-align: center; margin: 8px 0; }
    button { background: linear-gradient(95deg, #aa66ff, #813eff); border: none; padding: 14px; width: 100%; border-radius: 50px; font-weight: bold; font-size: 1rem; color: white; cursor: pointer; }
    footer { text-align: center; margin-top: 3rem; opacity: 0.7; }
  </style>
</head>
<body>
<div class="container">
  <div class="glow-header">
    <div class="badge-neon">⚡ ADMIN FASTRESS • SLOW RES = ADA KESIBUKAN ⚡</div>
    <h1>ZAANCITER.STR</h1>
    <div class="brand-str">✦ OB52 STORE ✦</div>
    <div class="sub"> LEBIH MAHAL LEBIH GACOR | FULL TUTOR + GARANSI</div>
  </div>

  <div class="hero-img">
    <img id="mainProductImage" src="https://files.catbox.moe/321av5.jpg" alt="Sasuke" title="Double klik untuk ganti foto">
  </div>

  <div id="productListRoot"></div>
  <footer> DANA & GOPAY : 082392368932 | QRIS coming soon | Bergaransi</footer>
</div>

<div id="orderModal" class="modal-modern">
  <div class="modal-container">
    <span class="close-modal">&times;</span>
    <h3>✨ Order Produk</h3>
    <p id="modalProductName" style="font-weight:600; color:#d4b3ff;"></p>
    <p id="modalProductPrice" style="font-size:1.3rem; margin:4px 0 12px;"></p>
    
    <div class="form-group">
      <input type="text" id="tiktokName" placeholder="Nama TikTok">
    </div>
    <div class="form-group">
      <input type="tel" id="waNumber" placeholder="Nomor WhatsApp (aktif)">
    </div>
    <div class="form-group">
      <input type="email" id="emailBuyer" placeholder="Email Gmail">
    </div>
    
    <div class="form-group">
      <label>📸 Upload Bukti SS Pembayaran</label>
      <input type="file" id="proofImage" accept="image/*" class="file-input-custom">
      <div id="previewContainer" class="preview-container">
        <img id="previewImg" class="preview-img" alt="Preview bukti">
      </div>
    </div>

    <label>💳 Metode Bayar</label>
    <div class="payment-flex">
      <label class="pay-method"><input type="radio" name="payMethod" value="DANA" checked> 💰 DANA</label>
      <label class="pay-method"><input type="radio" name="payMethod" value="GOPAY">  GOPAY</label>
      <label class="pay-method" style="opacity:0.6"><input type="radio" name="payMethod" value="QRIS" disabled> 📱 QRIS (CS)</label>
    </div>
    
    <div id="nomorDisplay" class="nomor-rekening"> Nomor DANA: 082392368932</div>
    
    <button id="sendOrderBtn"> KIRIM KE BOT TELEGRAM </button>
    <div class="note-text" style="margin-top:12px; font-size:0.7rem;">*Klik tombol "Pilih file" untuk buka galeri/file manager HP</div>
  </div>
</div>

<script>
  const rawProducts = [
    "AIMLOCK 40% : 10K","AIMLOCK 45% : 15K","AIMLOCK 50% : 20K","AIMLOCK 65% : 25K","AIMLOCK 80% : 35K","AIMLOCK 90% : 50K",
    "HEADLOCK 40% : 10K","HEADLOCK 45% : 15K","HEADLOCK 50% : 20K","HEADLOCK 65% : 25K","HEADLOCK 80% : 35K","HEADLOCK 90% : 50K",
    "LOCK HEAD 99% : 129K","DRAG HS 40% : 10K","DRAG HS 45% : 15K","DRAG HS 55% : 20K","DRAG HS 65% : 25K","DRAG HS 80% : 35K","DRAG HS 90% : 50K",
    "EASY DRAG 40% : 10K","EASY DRAG 45% : 15K","EASY DRAG 55% : 20K","EASY DRAG 65% : 25K","EASY DRAG 80% : 35K","EASY DRAG 90% : 50K",
    "BADAN HS ALL ANDRO : 40K","SET ANDRO VIP : 30K",
    "BADAN HS IOS : 70k","LEHER HS IOS : 70k","HEADLOCK 50% : 55k","HEADLOCK 70% : 75k","HEADLOCK 80% : 85k","HEADLOCK 90% : 95k",
    "DRAG HS IOS 50% : 50K","DRAG HS IOS 65% : 65k","DRAG HS IOS 80% : 80K","DRAG HS IOS 90% : 90K","SET IP VIP : 50K",
    "HOLOGRAM SENJATA (ANDRO) : 15k","HOLOGRAM 3D (ANDRO) : 20K","HOLOGRAM SENJATA (IOS) : 30K","HOLOGRAM 3D (IOS) : 35K",
    "GLOWAL MINI : 10K","GLOWAL GEPENG : 15K","GRAFIK MC : 10K"
  ];

  function parseProduct(str) {
    let idx = str.lastIndexOf(":");
    let name = str.substring(0, idx).trim();
    let priceRaw = str.substring(idx+1).trim().toLowerCase().replace(/k/g, "000");
    let priceNum = parseInt(priceRaw.replace(/[^0-9]/g, ""));
    if (isNaN(priceNum)) priceNum = 0;
    let priceFormatted = "Rp " + priceNum.toLocaleString("id-ID");
    return { name, priceNum, priceFormatted };
  }

  const allProducts = rawProducts.map(p => parseProduct(p));
  const categories = {
    "📱 ANDROID 🔥": allProducts.slice(0,27),
    "🍏 IPHONE / IOS ✨": allProducts.slice(27,38),
    "🌀 HOLOGRAM (ANDRO & IOS)": allProducts.slice(38,42),
    "💎 GLOWAL MINI/GEPENG": allProducts.slice(42,44),
    "🎮 GRAFIK MC": allProducts.slice(44,45)
  };

  let selectedProduct = null;
  let selectedImageFile = null;

  const modal = document.getElementById("orderModal");
  const closeModalBtn = document.querySelector(".close-modal");
  const modalProductName = document.getElementById("modalProductName");
  const modalProductPrice = document.getElementById("modalProductPrice");
  const nomorDisplay = document.getElementById("nomorDisplay");

  function renderShop() {
    const root = document.getElementById("productListRoot");
    root.innerHTML = "";
    for (let [catName, items] of Object.entries(categories)) {
      if (items.length === 0) continue;
      const catDiv = document.createElement("div");
      catDiv.className = "category-card";
      catDiv.innerHTML = `<div class="category-title"><span>${catName}</span></div><div class="product-grid" id="grid-${catName.replace(/\s/g,'')}"></div>`;
      root.appendChild(catDiv);
      const grid = catDiv.querySelector(".product-grid");
      items.forEach(prod => {
        const card = document.createElement("div");
        card.className = "product-card";
        card.innerHTML = `<div class="badge-platform">${prod.name.includes("IOS") ? "🍎 iOS" : (prod.name.includes("ANDRO") ? "🤖 Android" : "⚡ All")}</div><div class="product-name">${prod.name}</div><div class="product-price">${prod.priceFormatted}</div>`;
        card.onclick = () => openOrderModal(prod);
        grid.appendChild(card);
      });
    }
  }

  function openOrderModal(product) {
    selectedProduct = product;
    modalProductName.innerText = `📦 ${product.name}`;
    modalProductPrice.innerText = `${product.priceFormatted}`;
    modal.style.display = "flex";
    document.getElementById("proofImage").value = "";
    document.getElementById("previewContainer").style.display = "none";
    selectedImageFile = null;
    updateNomorByMethod();
  }

  function updateNomorByMethod() {
    const selected = document.querySelector('input[name="payMethod"]:checked');
    if (selected && selected.value === "DANA") nomorDisplay.innerHTML = " Nomor DANA: 082392368932";
    else if (selected && selected.value === "GOPAY") nomorDisplay.innerHTML = " Nomor GOPAY: 082392368932";
    else nomorDisplay.innerHTML = "Nomor DANA/GOPAY: 082392368932";
  }

  const fileInput = document.getElementById("proofImage");
  const previewContainer = document.getElementById("previewContainer");
  const previewImg = document.getElementById("previewImg");

  fileInput.addEventListener("change", function(e) {
    const file = e.target.files[0];
    if (file && file.type.startsWith("image/")) {
      selectedImageFile = file;
      const reader = new FileReader();
      reader.onload = function(ev) {
        previewImg.src = ev.target.result;
        previewContainer.style.display = "block";
      };
      reader.readAsDataURL(file);
    } else {
      alert("Harap pilih file gambar (jpg/png)");
    }
  });

  document.querySelectorAll('input[name="payMethod"]').forEach(radio => {
    radio.addEventListener("change", updateNomorByMethod);
  });

  closeModalBtn.onclick = () => modal.style.display = "none";
  window.onclick = (e) => { if (e.target === modal) modal.style.display = "none"; };

  const BOT_TOKEN = "8186605145:AAH4nAskT_3TbCjYP_WC2I6ZcLspEAJmnTM";
  const CHAT_ID = "7491173075";

  document.getElementById("sendOrderBtn").addEventListener("click", async () => {
    const tiktok = document.getElementById("tiktokName").value.trim();
    const wa = document.getElementById("waNumber").value.trim();
    const email = document.getElementById("emailBuyer").value.trim();
    const payMethod = document.querySelector('input[name="payMethod"]:checked');

    if (!tiktok || !wa || !email) { alert("Isi semua data (TikTok, WA, Email)"); return; }
    if (!selectedImageFile) { alert("Upload bukti SS pembayaran terlebih dahulu"); return; }
    if (!payMethod || payMethod.value === "QRIS") { alert("Pilih DANA atau GOPAY"); return; }
    if (!selectedProduct) { alert("Pilih produk"); return; }

    const formData = new FormData();
    formData.append("chat_id", CHAT_ID);
    formData.append("photo", selectedImageFile, "bukti_pembayaran.jpg");
    formData.append("caption", `🛍️ ORDER MASUK 🛍️\nTikTok: ${tiktok}\nWA: ${wa}\nEmail: ${email}\nProduk: ${selectedProduct.name}\nHarga: ${selectedProduct.priceFormatted}\nMetode: ${payMethod.value}\nNo tujuan: 082392368932`);

    try {
      const photoRes = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: "POST", body: formData });
      const resultPhoto = await photoRes.json();
      if (resultPhoto.ok) {
        alert("✅ Bukti & pesanan terkirim! Admin akan hubungi via WA.");
        modal.style.display = "none";
        document.getElementById("tiktokName").value = "";
        document.getElementById("waNumber").value = "";
        document.getElementById("emailBuyer").value = "";
        fileInput.value = "";
        previewContainer.style.display = "none";
        selectedImageFile = null;
      } else { alert("Gagal mengirim bukti, coba lagi."); console.error(resultPhoto); }
    } catch (err) { alert("Error: " + err.message); }
  });

  const mainImg = document.getElementById("mainProductImage");
  mainImg.addEventListener("dblclick", () => {
    let newUrl = prompt("Ganti URL foto Sasuke:", mainImg.src);
    if (newUrl && newUrl.trim() !== "") mainImg.src = newUrl.trim();
  });

  renderShop();
  updateNomorByMethod();
</script>
</body>
</html>
